<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCASFLIX — Profile Lock</title>
  <link rel="stylesheet" href="pin.css">
</head>
<body>

<a class="pin-brand" href="profile.html">SCASFLIX</a>

<!-- Profile avatar + name (populated by pin.js) -->
<div class="pin-page-avatar" id="pinAvatar"></div>
<div class="pin-page-name"   id="pinProfileName"></div>
<div class="pin-page-label">Enter your 4-digit PIN to continue</div>

<!-- ── PIN entry widget ── -->
<div id="pinWidget">
  <div class="pin-dots" id="pinBoxes">
    <div class="pin-box" data-idx="0"></div>
    <div class="pin-box" data-idx="1"></div>
    <div class="pin-box" data-idx="2"></div>
    <div class="pin-box" data-idx="3"></div>
    <input id="pinRealInput" class="pin-real-input"
           type="tel" maxlength="4"
           pattern="[0-9]*" inputmode="numeric"
           autocomplete="off">
  </div>

  <div class="pin-page-error"  id="pinError"></div>
  <div class="pin-attempts"    id="pinAttempts"></div>

  <button class="btn-back-profile" onclick="goBack()">← Back to Profiles</button>
</div>

<!-- ── Locked-out state (shown after 5 wrong attempts) ── -->
<div id="pinLockedMsg" class="pin-blocked-msg" style="display:none;">
  <h2>🔒 Too many incorrect attempts</h2>
  <p>Please wait <strong id="lockCountdown">30</strong> seconds before trying again.</p>
  <button class="btn-back-profile" style="margin-top:20px;" onclick="goBack()">← Back to Profiles</button>
</div>

<script src="auth.js"></script>
<script src="pin.js"></script>
</body>
</html>
